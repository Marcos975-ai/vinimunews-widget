<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINIMUNEWS - Esportes, Fama e Entretenimento</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f5f7;
      color: #111827;
    }
    .widget {
      width: 100%;
      padding: 10px;
      background: #f3f5f7;
    }
    .box {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    h2 {
      margin: 0;
      padding: 14px;
      font-size: 20px;
      color: #fff;
      background: #0f4c81;
    }
    .list { display: flex; flex-direction: column; }
    .card {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 11px;
      padding: 12px;
      border-bottom: 1px solid #edf0f3;
      text-decoration: none;
      color: inherit;
      background: #fff;
    }
    .card:hover { background: #f9fafb; }
    .thumb {
      width: 110px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      background: #e5e7eb;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
      margin: 0 0 5px;
    }
    .meta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 5px;
    }
    .desc {
      font-size: 12px;
      color: #374151;
      line-height: 1.3;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .status {
      padding: 14px;
      font-size: 13px;
      color: #6b7280;
    }
    @media (max-width: 600px) {
      .widget { padding: 6px; }
      h2 { font-size: 18px; }
      .card {
        grid-template-columns: 100px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
      }
      .thumb { width: 100px; height: 74px; }
      .title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <section class="box">
      <h2>⚽ Esportes, Fama e Entretenimento</h2>
      <div id="news" class="status">Carregando notícias...</div>
    </section>
  </div>

<script>
const FEEDS = [
  "https://ge.globo.com/",
  "https://www.cnnbrasil.com.br/pop/"
];

const MAX_ITEMS = 10;

const PROXIES = [
  url => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
];

function stripHtml(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return (div.textContent || div.innerText || "").trim();
}

function placeholder() {
  return "https://placehold.co/300x200?text=VINIMUNEWS";
}

function getImageFromText(text) {
  const match = (text || "").match(/<img[^>]+src=["']([^"']+)["']/i);
  return match ? match[1] : "";
}

function formatDate(dateText) {
  if (!dateText) return "";
  const d = new Date(dateText);
  if (isNaN(d)) return "";
  return d.toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
}

async function fetchViaRss2Json(url) {
  const res = await fetch(PROXIES[0](url), { cache: "no-store" });
  if (!res.ok) throw new Error("RSS2JSON HTTP " + res.status);
  const data = await res.json();
  if (!data.items) throw new Error("Sem itens");
  return data.items.map(item => ({
    title: stripHtml(item.title),
    link: item.link,
    description: stripHtml(item.description || item.content || ""),
    pubDate: item.pubDate || "",
    source: new URL(url).hostname.replace("www.", ""),
    image: item.thumbnail || item.enclosure?.link || getImageFromText(item.description || item.content || "") || placeholder(),
    timestamp: new Date(item.pubDate || "").getTime() || 0
  }));
}

async function fetchViaXml(url) {
  const res = await fetch(PROXIES[1](url), { cache: "no-store" });
  if (!res.ok) throw new Error("AllOrigins HTTP " + res.status);
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, "text/xml");

  return [...xml.querySelectorAll("item")].map(item => {
    const media = item.getElementsByTagName("media:content")[0] || item.getElementsByTagName("media:thumbnail")[0];
    const enclosure = item.getElementsByTagName("enclosure")[0];
    const desc = item.querySelector("description")?.textContent || "";
    return {
      title: stripHtml(item.querySelector("title")?.textContent || ""),
      link: item.querySelector("link")?.textContent?.trim() || "#",
      description: stripHtml(desc),
      pubDate: item.querySelector("pubDate")?.textContent || "",
      source: new URL(url).hostname.replace("www.", ""),
      image: media?.getAttribute("url") || enclosure?.getAttribute("url") || getImageFromText(desc) || placeholder(),
      timestamp: new Date(item.querySelector("pubDate")?.textContent || "").getTime() || 0
    };
  });
}

async function fetchFeed(url) {
  try {
    return await fetchViaRss2Json(url);
  } catch (e) {
    try {
      return await fetchViaXml(url);
    } catch (err) {
      console.warn("Falha no feed:", url, err);
      return [];
    }
  }
}

async function render() {
  const el = document.getElementById("news");
  el.className = "status";
  el.textContent = "Carregando notícias...";

  const results = await Promise.all(FEEDS.map(fetchFeed));
  const items = results.flat()
    .filter(item => item.title && item.link)
    .sort((a, b) => b.timestamp - a.timestamp)
    .slice(0, MAX_ITEMS);

  if (!items.length) {
    el.textContent = "Nenhuma notícia carregada. Se isso acontecer, use o link RSS gerado pelo RSS.app no lugar da URL normal.";
    return;
  }

  el.className = "list";
  el.innerHTML = "";

  for (const item of items) {
    const a = document.createElement("a");
    a.className = "card";
    a.href = item.link;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.innerHTML = `
      <img class="thumb" src="${item.image}" alt="" loading="lazy" onerror="this.src='${placeholder()}'">
      <div>
        <p class="title">${item.title}</p>
        <div class="meta">${item.source}${formatDate(item.pubDate) ? " • " + formatDate(item.pubDate) : ""}</div>
        <p class="desc">${item.description}</p>
      </div>
    `;
    el.appendChild(a);
  }
}

render();
setInterval(render, 15 * 60 * 1000);
</script>
</body>
</html>
