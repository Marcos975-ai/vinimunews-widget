<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esportes, Fama e Entretenimento</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f5f7;
      color: #111827;
    }

    .widget {
      width: 100%;
      padding: 10px;
    }

    .box {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    .top {
      background: #0f4c81;
      color: #ffffff;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .top h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .refresh {
      border: 0;
      background: rgba(255,255,255,.18);
      color: #fff;
      border-radius: 999px;
      padding: 7px 11px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    .refresh:hover { background: rgba(255,255,255,.28); }

    .status {
      padding: 14px;
      font-size: 14px;
      color: #6b7280;
    }

    .list {
      display: flex;
      flex-direction: column;
    }

    .card {
      display: grid;
      grid-template-columns: 115px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid #edf0f3;
      color: inherit;
      text-decoration: none;
      background: #fff;
    }

    .card:hover {
      background: #f9fafb;
    }

    .thumb {
      width: 115px;
      height: 82px;
      object-fit: cover;
      border-radius: 10px;
      background: #e5e7eb;
    }

    .title {
      margin: 0 0 6px 0;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 700;
      color: #111827;
    }

    .meta {
      margin-bottom: 5px;
      font-size: 12px;
      color: #6b7280;
    }

    .desc {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: #374151;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .footer {
      padding: 10px;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
      background: #f9fafb;
    }

    @media (max-width: 600px) {
      .widget { padding: 6px; }

      .top {
        padding: 12px;
        align-items: flex-start;
        flex-direction: column;
      }

      .top h2 { font-size: 18px; }

      .card {
        grid-template-columns: 100px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
      }

      .thumb {
        width: 100px;
        height: 74px;
      }

      .title { font-size: 14px; }
      .desc { -webkit-line-clamp: 2; }
    }
  </style>
</head>

<body>
  <div class="widget">
    <section class="box">
      <div class="top">
        <h2>⚽ Esportes, Fama e Entretenimento</h2>
        <button class="refresh" onclick="loadNews(true)">Atualizar</button>
      </div>

      <div id="news" class="status">Carregando notícias...</div>
      <div class="footer" id="footer">Atualização automática ativada</div>
    </section>
  </div>

<script>
/*
  WIDGET GRATUITO - SEM RSS.APP
  Fontes:
  - GE: https://ge.globo.com/
  - CNN Pop: https://www.cnnbrasil.com.br/pop/

  Observação:
  O navegador bloqueia RSS direto por CORS.
  Por isso usamos proxies públicos gratuitos.
*/

const SOURCES = [
  {
    name: "ge",
    url: "https://ge.globo.com/rss/ge"
  },
  {
    name: "CNN Pop",
    url: "https://www.cnnbrasil.com.br/pop/feed/"
  }
];

const MAX_ITEMS = 12;

const PROXIES = [
  url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  url => "https://corsproxy.io/?" + encodeURIComponent(url)
];

function cleanText(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return (div.textContent || div.innerText || "").replace(/\s+/g, " ").trim();
}

function fallbackImage() {
  return "https://placehold.co/400x250?text=Not%C3%ADcia";
}

function findImage(item) {
  const mediaContent = item.getElementsByTagName("media:content")[0];
  if (mediaContent && mediaContent.getAttribute("url")) return mediaContent.getAttribute("url");

  const mediaThumb = item.getElementsByTagName("media:thumbnail")[0];
  if (mediaThumb && mediaThumb.getAttribute("url")) return mediaThumb.getAttribute("url");

  const enclosure = item.getElementsByTagName("enclosure")[0];
  if (enclosure && enclosure.getAttribute("url")) return enclosure.getAttribute("url");

  const description = item.querySelector("description")?.textContent || "";
  const match = description.match(/<img[^>]+src=["']([^"']+)["']/i);
  if (match) return match[1];

  return fallbackImage();
}

function formatDate(dateText) {
  if (!dateText) return "";
  const date = new Date(dateText);
  if (isNaN(date)) return "";
  return date.toLocaleString("pt-BR", {
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function fetchWithProxy(feedUrl) {
  let lastError = null;

  for (const proxy of PROXIES) {
    try {
      const response = await fetch(proxy(feedUrl), { cache: "no-store" });
      if (!response.ok) throw new Error("Erro HTTP " + response.status);

      const text = await response.text();
      if (!text || text.length < 50) throw new Error("Resposta vazia");

      return text;
    } catch (error) {
      lastError = error;
    }
  }

  throw lastError;
}

async function loadFeed(source) {
  try {
    const xmlText = await fetchWithProxy(source.url);
    const xml = new DOMParser().parseFromString(xmlText, "text/xml");

    const parseError = xml.querySelector("parsererror");
    if (parseError) throw new Error("XML inválido");

    const items = [...xml.querySelectorAll("item")];

    return items.map(item => {
      const title = cleanText(item.querySelector("title")?.textContent || "");
      const link = (item.querySelector("link")?.textContent || "").trim();
      const description = cleanText(item.querySelector("description")?.textContent || "");
      const pubDate = item.querySelector("pubDate")?.textContent || "";
      const timestamp = new Date(pubDate).getTime() || 0;

      return {
        source: source.name,
        title,
        link,
        description,
        pubDate,
        timestamp,
        image: findImage(item)
      };
    }).filter(n => n.title && n.link);

  } catch (error) {
    console.warn("Falha ao carregar:", source.name, error);
    return [];
  }
}

function renderItems(items) {
  const news = document.getElementById("news");

  if (!items.length) {
    news.className = "status";
    news.innerHTML = "Não consegui carregar as notícias agora. Recarregue a página ou tente novamente em alguns minutos.";
    return;
  }

  news.className = "list";
  news.innerHTML = "";

  for (const item of items) {
    const card = document.createElement("a");
    card.className = "card";
    card.href = item.link;
    card.target = "_blank";
    card.rel = "noopener noreferrer";

    card.innerHTML = `
      <img class="thumb" src="${item.image}" alt="" loading="lazy" onerror="this.src='${fallbackImage()}'">
      <div>
        <p class="title">${item.title}</p>
        <div class="meta">${item.source}${formatDate(item.pubDate) ? " • " + formatDate(item.pubDate) : ""}</div>
        <p class="desc">${item.description}</p>
      </div>
    `;

    news.appendChild(card);
  }
}

async function loadNews(manual = false) {
  const news = document.getElementById("news");
  const footer = document.getElementById("footer");

  news.className = "status";
  news.textContent = manual ? "Atualizando notícias..." : "Carregando notícias...";

  const results = await Promise.all(SOURCES.map(loadFeed));
  const items = results
    .flat()
    .sort((a, b) => b.timestamp - a.timestamp)
    .slice(0, MAX_ITEMS);

  renderItems(items);

  footer.textContent = "Última verificação: " + new Date().toLocaleString("pt-BR", {
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

loadNews();

// Verifica novamente a cada 15 minutos.
setInterval(() => loadNews(false), 15 * 60 * 1000);
</script>
</body>
</html>
