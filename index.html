<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VINIMUNEWS - Widget de Notícias</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f5f7;
      color: #111827;
    }
    .vinimunews-widget {
      width: 100%;
      padding: 12px;
    }
    .columns {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .column {
      background: #ffffff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      border: 1px solid #e5e7eb;
      min-width: 0;
    }
    .column h2 {
      margin: 0;
      padding: 13px 14px;
      font-size: 18px;
      line-height: 1.2;
      color: #ffffff;
      background: #0f4c81;
    }
    .feed-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .card {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #edf0f3;
      text-decoration: none;
      color: inherit;
      background: #fff;
    }
    .card:hover { background: #f9fafb; }
    .thumb {
      width: 92px;
      height: 68px;
      object-fit: cover;
      border-radius: 10px;
      background: #e5e7eb;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      margin: 0 0 5px 0;
      color: #111827;
    }
    .meta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .desc {
      font-size: 12px;
      color: #374151;
      line-height: 1.3;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .status {
      padding: 14px;
      font-size: 13px;
      color: #6b7280;
    }
    .footer {
      font-size: 11px;
      color: #6b7280;
      text-align: center;
      padding: 10px;
    }
    @media (max-width: 900px) {
      .columns { grid-template-columns: 1fr; }
      .vinimunews-widget { padding: 8px; }
      .column h2 { font-size: 17px; }
      .card { grid-template-columns: 105px minmax(0, 1fr); }
      .thumb { width: 105px; height: 78px; }
      .title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="vinimunews-widget">
    <div class="columns" id="columns"></div>
    <div class="footer">VINIMUNEWS • notícias atualizadas automaticamente via RSS</div>
  </div>

<script>
/*
  COMO EDITAR:
  - Troque, adicione ou remova links RSS dentro de "feeds".
  - maxItems controla quantas notícias aparecem em cada coluna.
  - Para usar RSS.app, cole aqui o link XML gerado por ele.
*/

const COLUMNS = [
  {
    title: "⚽ Esportes, Fama e Entretenimento",
    maxItems: 8,
    feeds: [
      // GE / esporte: se esse feed não puxar, troque pelo XML gerado no RSS.app.
      "https://ge.globo.com/rss/ge",
      "https://gshow.globo.com/rss/gshow"
    ]
  },
  {
    title: "🌎 Brasil, Geral, Internacional e Política",
    maxItems: 8,
    feeds: [
      "https://g1.globo.com/rss/g1/politica",
      "https://g1.globo.com/rss/g1/mundo",
      "https://www.cnnbrasil.com.br/feed/",
      "https://jovempan.com.br/feed/"
    ]
  },
  {
    title: "💻 Saúde, Tecnologia e Games",
    maxItems: 8,
    feeds: [
      "https://g1.globo.com/rss/g1/ciencia-e-saude",
      "https://www.canaltech.com.br/rss/",
      "https://flowgames.gg/feed/"
    ]
  }
];

const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

function stripHtml(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return (div.textContent || div.innerText || "").trim();
}

function getImage(item) {
  const media = item.getElementsByTagName("media:content")[0] || item.getElementsByTagName("media:thumbnail")[0];
  if (media && media.getAttribute("url")) return media.getAttribute("url");

  const enclosure = item.getElementsByTagName("enclosure")[0];
  if (enclosure && enclosure.getAttribute("url")) return enclosure.getAttribute("url");

  const desc = item.getElementsByTagName("description")[0]?.textContent || "";
  const match = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
  return match ? match[1] : "https://placehold.co/300x200?text=VINIMUNEWS";
}

function formatDate(dateText) {
  if (!dateText) return "";
  const d = new Date(dateText);
  if (isNaN(d)) return "";
  return d.toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
}

async function fetchFeed(feedUrl) {
  let lastError = null;

  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(feedUrl), { cache: "no-store" });
      if (!res.ok) throw new Error("Erro HTTP " + res.status);
      const text = await res.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "text/xml");

      const items = [...xml.querySelectorAll("item")].map(item => {
        const title = stripHtml(item.querySelector("title")?.textContent || "");
        const link = item.querySelector("link")?.textContent?.trim() || "#";
        const description = stripHtml(item.querySelector("description")?.textContent || "");
        const pubDate = item.querySelector("pubDate")?.textContent || item.querySelector("published")?.textContent || "";
        const source = new URL(feedUrl).hostname.replace("www.", "");
        return {
          title,
          link,
          description,
          pubDate,
          source,
          image: getImage(item),
          timestamp: new Date(pubDate).getTime() || 0
        };
      });

      return items.filter(n => n.title && n.link);
    } catch (err) {
      lastError = err;
    }
  }

  console.warn("Falha ao carregar feed:", feedUrl, lastError);
  return [];
}

async function renderColumn(config) {
  const column = document.createElement("section");
  column.className = "column";
  column.innerHTML = `<h2>${config.title}</h2><div class="status">Carregando notícias...</div>`;
  document.getElementById("columns").appendChild(column);

  const allItemsNested = await Promise.all(config.feeds.map(fetchFeed));
  const allItems = allItemsNested.flat()
    .sort((a, b) => b.timestamp - a.timestamp)
    .slice(0, config.maxItems);

  if (!allItems.length) {
    column.innerHTML = `<h2>${config.title}</h2><div class="status">Nenhuma notícia carregada. Verifique os links RSS desta coluna.</div>`;
    return;
  }

  const list = document.createElement("div");
  list.className = "feed-list";

  allItems.forEach(item => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = item.link;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.innerHTML = `
      <img class="thumb" src="${item.image}" alt="" loading="lazy" onerror="this.src='https://placehold.co/300x200?text=VINIMUNEWS'">
      <div>
        <p class="title">${item.title}</p>
        <div class="meta">${item.source}${formatDate(item.pubDate) ? " • " + formatDate(item.pubDate) : ""}</div>
        <p class="desc">${item.description}</p>
      </div>
    `;
    list.appendChild(a);
  });

  column.innerHTML = `<h2>${config.title}</h2>`;
  column.appendChild(list);
}

async function init() {
  document.getElementById("columns").innerHTML = "";
  for (const config of COLUMNS) {
    renderColumn(config);
  }
}

init();

// Atualiza a página automaticamente a cada 15 minutos.
setInterval(init, 15 * 60 * 1000);
</script>
</body>
</html>
